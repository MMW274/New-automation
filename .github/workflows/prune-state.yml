name: Monthly State Prune

on:
  schedule:
    - cron: "0 6 1 * *"  # 1st of every month, 06:00 UTC
  workflow_dispatch:

concurrency:
  group: news-prune
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: |
            output/submitted.json
            output/daily_counts.json
            output/dedupe_ids.json
            output/history
          key: pipeline-state-v3-${{ github.run_id }}
          restore-keys: |
            pipeline-state-v3-

      - name: Install dependencies
        timeout-minutes: 5
        run: pip install -r requirements.txt

      - name: Prune state
        timeout-minutes: 5
        run: python -m src.storage.pruner

      - name: Save pruned state to cache (next run will pick it up)
        uses: actions/cache/save@v4
        with:
          path: |
            output/submitted.json
            output/daily_counts.json
            output/dedupe_ids.json
            output/history
          key: pipeline-state-v3-prune-${{ github.run_id }}

      - name: Upload pruned state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-after-prune-${{ github.run_number }}
          path: |
            output/submitted.json
            output/daily_counts.json
            output/dedupe_ids.json
            output/history
          retention-days: 365

      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pruner failure: ${new Date().toISOString().slice(0,10)}`,
              body: `Monthly state pruner failed. Inspect ${runUrl}`,
              labels: ["pipeline-failure", "pruner"],
            });
