name: Weekly Analytics

on:
  schedule:
    - cron: "0 8 * * 1"  # Mondays 08:00 UTC
  workflow_dispatch:

concurrency:
  group: news-analytics
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    environment: YOUTUBE_API_KEY

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: |
            output/submitted.json
            output/daily_counts.json
            output/dedupe_ids.json
            output/history
          key: pipeline-state-v3-${{ github.run_id }}
          restore-keys: |
            pipeline-state-v3-

      - name: Install dependencies
        timeout-minutes: 5
        run: pip install -r requirements.txt

      - name: Snapshot performance
        timeout-minutes: 10
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python -m src.analytics.performance

      - name: Upload performance snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-${{ github.run_number }}
          path: output/performance.json
          retention-days: 365

      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Analytics failure: ${new Date().toISOString().slice(0,10)}`,
              body: `Weekly analytics run failed. Inspect ${runUrl}`,
              labels: ["pipeline-failure", "analytics"],
            });
