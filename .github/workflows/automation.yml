name: News Automation Pipeline

on:
  schedule:
    # 8am + 8pm Berlin (CEST = UTC+2) — 2 runs/day
    - cron: "0 6,18 * * *"
  workflow_dispatch:

concurrency:
  group: news-automation
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Secrets are stored under GitHub Environment "YOUTUBE_API_KEY" (not repo secrets)
    environment: YOUTUBE_API_KEY

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: |
            output/submitted.json
            output/daily_counts.json
          key: pipeline-state-v2
          restore-keys: pipeline-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VIZARDAI_API_KEY: ${{ secrets.VIZARDAI_API_KEY }}
        run: python -m src.scheduler.run_pipeline

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-output-${{ github.run_number }}
          path: |
            output/submitted.json
            output/daily_counts.json
            output/candidates.json
          retention-days: 30
