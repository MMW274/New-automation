# Overlay applied on top of config/scoring.yaml at runtime.
# See ../README.md for merge rules and ./README.md for rationale.

# --- Hard quality floor ---
# Only consider source videos that are already going viral. A 400k-view
# YouTube upload in 24h is a top-tier news item for the channels we watch.
min_views: 400000

# Must be currently hot — 5,000 views/hour means roughly a 120K/day pace.
# Anything cooling off (old viral hit losing steam) gets dropped.
min_views_per_hour: 5000

# At least 0.5% of viewers must engage (like + 3*comment / views).
# Stops passive-view / autoplay-padded numbers from sneaking in.
min_engagement_rate: 0.005

