# Overlay applied on top of config/scoring.yaml at runtime.
# See ../README.md for merge rules and ./README.md for rationale.

# --- Hard quality floor ---
# High-traction news only, but loose enough to find daily candidates.
min_views: 100000

# ~2,400 views/hour ≈ 58K/day pace — still clearly trending.
min_views_per_hour: 2500

# At least 0.4% engagement (like + 3*comment / views).
min_engagement_rate: 0.004

# Look back 36h so afternoon runs still see this morning's viral hits.
max_age_hours: 36

# --- Topic focus additions ---
