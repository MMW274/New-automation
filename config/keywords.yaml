# Discovery settings
# Keyword search costs 100 YouTube API units per query — disable for cloud runs.
keyword_search_enabled: false

queries:
  - "Trump news today"
  - "Trump White House"
  - "US government news"
  - "Trump press conference"

# YouTube trending feed (mostPopular videos in News & Politics category).
# Costs 1 quota unit per run; catches breaking stories outside the 11
# configured channels (e.g. Reuters, AP, Politico if they trend).
trending_news_enabled: true
trending_region: US
