# Vizard settings
# Docs: https://docs.vizard.ai/docs/quickstart

lang: en
video_type: 2
ratio_of_clip: 1
prefer_length: [0]

subtitle_switch: 1
headline_switch: 1
emoji_switch: 1
highlight_switch: 1
remove_silence_switch: 1
auto_broll_switch: 1

# Bouncy template (matches the manual UI styling). To find the ID:
#   Vizard workspace → Templates → open template → copy the numeric ID from URL.
# Leave as null to use Vizard's default template.
template_id: null
max_clip_number: 20

# --- Publishing ---
min_viral_score: 8.5

# Smart slotting: place each clip at the next platform-optimal US ET window
# (see src/scheduler/optimal_slots.py). Set false to fall back to legacy
# now+stagger spacing.
smart_publish_slots: true

# Per-platform AI captions: when true, requests a native caption from
# Vizard /project/ai-social for each target platform (TikTok/YT/X). Falls
# back silently to Vizard's default auto-caption on error.
per_platform_captions: true

# Content safety gate. When true, clip titles are screened against a
# blocklist of terms that trigger TikTok / YouTube Shorts demonetization
# or takedown (graphic violence, slurs, etc). Risky clips are held in
# output/review_queue.json instead of published. Extend the list via
# blocked_terms; default list lives in src/safety/content_filter.py.
safety_filter_enabled: true
blocked_terms: []

# Legacy stagger — only used when smart_publish_slots: false, or as a
# fallback when many clips contend for the same peak slot.
publish_stagger_minutes: 45
publish_gap_seconds: 10

# Source selection
source_videos_per_run: 3
max_clips_per_run: 4
max_clips_per_source: 2
max_one_video_per_channel: true

# Publish to ALL active Vizard accounts
publish_all_connected: true

social_accounts:
  youtube: Fill Viz
  tiktok: today_news98
  twitter: Fill Viz

# Enforced daily caps per platform (unique clips per calendar day, UTC)
platform_daily_limits:
  youtube: 3
  tiktok: 4
  twitter: 10
  facebook: 5
  instagram: 5
  linkedin: 3

poll_interval_seconds: 30
poll_timeout_seconds: 1800
dedupe_hours: 48

# Legacy (unused when stagger is active)
publish_immediately: false
auto_schedule: false
clips_per_day: 8
post_start_hour: 4
post_end_hour: 19
timezone: Europe/Berlin
start_offset_days: 1
