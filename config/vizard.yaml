# Vizard settings — matched to your manual UI workflow
# Docs: https://docs.vizard.ai/docs/quickstart

lang: en
video_type: 2
ratio_of_clip: 1
prefer_length: [0]

subtitle_switch: 1
headline_switch: 1
emoji_switch: 1
highlight_switch: 1
remove_silence_switch: 1
auto_broll_switch: 1

template_id: null
max_clip_number: 20

# --- Publishing ---
publish_immediately: true
min_viral_score: 8.5
publish_gap_seconds: 15

# Process 2-3 different source videos per run; cap total clips (~platform safe limits)
source_videos_per_run: 3
max_clips_per_run: 10
max_clips_per_source: 4

# Publish to EVERY active account connected in Vizard (YouTube, TikTok, Facebook, X, etc.)
publish_all_connected: true

# Optional name hints if publish_all_connected is false
social_accounts:
  youtube: Fill Viz
  tiktok: today_news98
  facebook: ""
  twitter: ""

# Platform safe daily limits (reference — we stay under these per run)
# YouTube Shorts: 1-3/day sweet spot | TikTok: 1-4/day | Facebook: 1-5/day | X: higher
platform_daily_limits:
  youtube: 3
  tiktok: 4
  facebook: 5
  twitter: 10
  instagram: 5
  linkedin: 3

# Legacy scheduling (only if publish_immediately: false)
auto_schedule: false
clips_per_day: 8
post_start_hour: 4
post_end_hour: 19
timezone: Europe/Berlin
start_offset_days: 1

poll_interval_seconds: 30
poll_timeout_seconds: 1800
dedupe_hours: 48
