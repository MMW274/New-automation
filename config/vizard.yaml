# Vizard settings
# Docs: https://docs.vizard.ai/docs/quickstart

lang: en
video_type: 2
ratio_of_clip: 1
prefer_length: [0]

subtitle_switch: 1
headline_switch: 1
emoji_switch: 1
highlight_switch: 1
remove_silence_switch: 1
auto_broll_switch: 1

template_id: null
max_clip_number: 20

# --- Publishing ---
min_viral_score: 8.5

# Stagger each clip by N minutes (avoids burst-posting spam flags)
publish_stagger_minutes: 45
publish_gap_seconds: 10

# Source selection
source_videos_per_run: 3
max_clips_per_run: 4
max_clips_per_source: 2
max_one_video_per_channel: true

# Publish to ALL active Vizard accounts
publish_all_connected: true

social_accounts:
  youtube: Fill Viz
  tiktok: today_news98
  twitter: Fill Viz

# Enforced daily caps per platform (unique clips per calendar day, UTC)
platform_daily_limits:
  youtube: 3
  tiktok: 4
  twitter: 10
  facebook: 5
  instagram: 5
  linkedin: 3

poll_interval_seconds: 30
poll_timeout_seconds: 1800
dedupe_hours: 48

# Legacy (unused when stagger is active)
publish_immediately: false
auto_schedule: false
clips_per_day: 8
post_start_hour: 4
post_end_hour: 19
timezone: Europe/Berlin
start_offset_days: 1
