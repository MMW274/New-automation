# Vizard settings
# Docs: https://docs.vizard.ai/docs/quickstart

lang: en
video_type: 2
ratio_of_clip: 1
prefer_length: [0]

subtitle_switch: 1
headline_switch: 1
emoji_switch: 1
highlight_switch: 1
remove_silence_switch: 1
auto_broll_switch: 1

template_id: null
max_clip_number: 20

# --- Publishing ---
min_viral_score: 8.5

# true = omit publishTime → Vizard posts live (green check right away).
# false = queue on the Vizard calendar until publishTime (clock icon).
publish_immediately: true

smart_publish_slots: false

per_platform_captions: true
safety_filter_enabled: true
blocked_terms: []

# Fallback stagger when publish_immediately: false
publish_stagger_minutes: 90
publish_gap_seconds: 15

# Volume — spread TikTok across 3 daily cron runs (1/run); YT/X can batch.
source_videos_per_run: 4
max_clips_per_run: 3
max_clips_per_source: 1
max_one_video_per_channel: true

publish_all_connected: false

social_accounts:
  youtube: Fill Viz
  tiktok: today_news98
  twitter: Fill Viz

excluded_accounts:
  - Shamy
  - Amy Sheldon

# Daily caps (UTC calendar day). TikTok kept conservative — failures spike above 3.
platform_daily_limits:
  youtube: 3
  tiktok: 3
  twitter: 3

# Per cloud run — TikTok 1/run avoids rate-limit red ! marks on the calendar.
platform_per_run_limits:
  youtube: 2
  tiktok: 1
  twitter: 2

poll_interval_seconds: 30
poll_timeout_seconds: 1800
dedupe_hours: 48

# Legacy
auto_schedule: false
clips_per_day: 8
post_start_hour: 4
post_end_hour: 19
timezone: Europe/Berlin
start_offset_days: 1
