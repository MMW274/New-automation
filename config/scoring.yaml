# How far back to look for fresh, relevant videos
max_age_hours: 24

# Minimum total views — filters out low-traction uploads
min_views: 5000

# Skip YouTube Shorts and very short clips (Vizard works best on long-form)
min_duration_seconds: 120
max_duration_seconds: 7200

# Strict relevance — a video must mention at least one of these in title or
# description. Trimmed June 2026 to USA-politics-only terms. Generic words like
# "us news", "america", "government" were removed because they matched
# WNBA / weather / flood stories.
relevance_terms:
  - trump
  - white house
  - congress
  - senate
  - house republicans
  - house democrats
  - capitol hill
  - executive order
  - oval office
  - maga
  - gop
  - vance
  - jd vance
  - biden
  - kamala
  - harris
  - rubio
  - desantis
  - washington dc
  - state of the union
  - impeachment
  - supreme court
  - scotus
  - doj
  - fbi
  - pentagon
  - ice raid
  - border crisis
  - tariff
  - air force one
  - press secretary
  - karoline leavitt

# HARD BLOCK — any video whose title or description matches one of these
# topic terms is dropped before scoring. Tuned for attention-grabbing
# Trump / USA-politics-only content; sports, weather, celebrity, and
# global-disaster stories are out.
blocked_topics:
  # Sports
  - wnba
  - nba
  - nfl
  - mlb
  - nhl
  - "premier league"
  - caitlin clark
  - lebron
  - super bowl
  - march madness
  - olympics
  - "world cup"
  - taylor swift
  - kanye
  # Weather / natural disasters (not politics)
  - flood
  - flooding
  - hurricane
  - tornado
  - wildfire
  - earthquake
  - tsunami
  - heatwave
  - blizzard
  # Celebrity / entertainment
  - kardashian
  - met gala
  - oscars
  - grammys
  - tony awards
  - billboard awards
  - red carpet
  # Foreign-only politics (we want US angle only)
  - "india news"
  - "uk news"
  - brexit
  - sunak
  - starmer
  - modi
  - "world news tonight"

# How many top candidates to keep in the output queue
top_n: 15

# Scoring weights
weights:
  views_per_hour: 1.0
  engagement_rate: 10.0
  like_ratio: 5.0

# Prefer the major USA news sources. Foreign / world-news outlets removed.
trusted_channels:
  - Fox News
  - CNN
  - NBC News
  - CBS News
  - The White House

channel_boost: 1.5
